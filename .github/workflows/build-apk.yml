name: Build APK & deploy to GitHub Pages

# Builds an installable DEBUG Android APK (no signing secrets required) and
# publishes a GitHub Pages site with a download button, install instructions,
# and the live web demo.
#
# One-time setup: repo Settings → Pages → Build and deployment →
# Source: "GitHub Actions".

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build APK + site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app (dist-app/)
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Assemble Pages site
        run: |
          mkdir -p _site/app
          cp -r dist-app/. _site/app/
          cp android/app/build/outputs/apk/debug/app-debug.apk _site/js-player.apk
          cp site/index.html _site/index.html

      - name: Upload APK as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: js-player-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
