name: Publish Android — Google Play

# Triggered manually, or called by the Release workflow (release.yml).
# Tag pushes do NOT publish directly — use the Release workflow so versions are
# bumped and tagged in one place (prevents double publishing).
on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        required: true
        default: "internal"
        type: choice
        options: [internal, alpha, beta, production]
      dry_run:
        description: "Build & sign the AAB but do NOT upload to Google Play"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      track:
        required: false
        default: "internal"
        type: string
      dry_run:
        required: false
        default: false
        type: boolean
      ref:
        description: "Git ref (tag/branch/sha) to build"
        required: false
        default: ""
        type: string

# ── Required GitHub Secrets ─────────────────────────────────────────────────
# KEYSTORE_BASE64          base64-encoded .jks release keystore
# KEYSTORE_PASSWORD        keystore password
# KEY_ALIAS                key alias inside the keystore
# KEY_PASSWORD             key password
# GOOGLE_PLAY_JSON_KEY     full JSON of Google Play service-account credentials
# ────────────────────────────────────────────────────────────────────────────

jobs:
  publish-android:
    name: Build & publish AAB → Play Store (${{ inputs.track || 'internal' }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (gate)
        run: npm test

      - name: Build web app (dist-app/)
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > jsplayer-release.jks

      - name: Build release AAB
        working-directory: android
        env:
          STORE_FILE:     ../jsplayer-release.jks
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab-${{ github.run_id }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Google Play
        if: ${{ !inputs.dry_run }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          packageName:   com.juhisohal.jsplayer
          releaseFiles:  android/app/build/outputs/bundle/release/app-release.aab
          track:         ${{ inputs.track || 'internal' }}
          status:        completed
          whatsNewDirectory: android/fastlane/metadata/android/en-US/changelogs

      - name: Dry run — skipped Google Play upload
        if: ${{ inputs.dry_run }}
        run: echo "dry_run=true → signed AAB built and uploaded as an artifact, but NOT published to Google Play."
