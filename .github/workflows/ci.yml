name: CI — Test & Lint

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit + Integration + Functional Tests ─────────────────────────────────
  unit-tests:
    name: Unit, Integration & Functional Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit + integration + functional tests
        run: npm test

      - name: Upload coverage report
        if: matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Coverage Gate ────────────────────────────────────────────────────────
  coverage:
    name: Coverage Thresholds
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run coverage (enforces thresholds)
        run: npm run test:coverage

  # ── Lint & Format ───────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build (lib + app)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build library (ES + UMD)
        run: npm run build:lib

      - name: Build app (for Capacitor)
        run: npm run build

      - name: Upload dist-app
        uses: actions/upload-artifact@v4
        with:
          name: dist-app
          path: dist-app/
          retention-days: 3

  # ── E2E Tests ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright / Chromium)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start dev server (background)
        run: npm run dev &
        env:
          CI: true

      - name: Wait for dev server
        run: npx wait-on http://localhost:5177 --timeout 30000

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
