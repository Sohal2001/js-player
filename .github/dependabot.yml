version: 2
updates:
  # npm dependencies (root project)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development

  # GitHub Actions used by the CI / publish workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Gradle (Android native project)
  - package-ecosystem: gradle
    directory: "/android"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
