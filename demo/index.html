<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0f14" />
    <title>JS Player</title>
    <link rel="icon" type="image/svg+xml" href="../public/icons/icon.svg" />
    <link rel="manifest" href="../public/manifest.json" />
    <style>
      :root {
        --bg: #0b0f14;
        --surface: #141a22;
        --surface-2: #1c2530;
        --line: #243040;
        --text: #eef3f8;
        --muted: #8b9bb0;
        --accent: #2f7bf6; /* MX-style blue */
        --accent-2: #00c2a8;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      /* ── App bar ─────────────────────────────────────────── */
      .appbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
        z-index: 20;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand__mark {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        display: grid;
        place-items: center;
        font-size: 16px;
      }
      .app-title {
        font-weight: 800;
        font-size: 18px;
        letter-spacing: 0.2px;
      }
      .spacer {
        flex: 1;
      }
      .add-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--accent);
        color: #fff;
        border: none;
        font-weight: 700;
        padding: 9px 14px;
        border-radius: 10px;
        cursor: pointer;
      }
      .add-btn:active {
        transform: scale(0.97);
      }
      /* ── Tabs ────────────────────────────────────────────── */
      .tabs {
        display: flex;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
      }
      .tab {
        flex: 1;
        background: none;
        border: none;
        color: var(--muted);
        padding: 13px 0;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        border-bottom: 2.5px solid transparent;
        letter-spacing: 0.3px;
      }
      .tab.active {
        color: var(--text);
        border-bottom-color: var(--accent);
      }
      /* ── Views ───────────────────────────────────────────── */
      main {
        flex: 1;
        overflow-y: auto;
        padding-bottom: 84px;
      }
      .view {
        display: none;
      }
      .view.active {
        display: block;
      }
      .empty {
        text-align: center;
        color: var(--muted);
        padding: 64px 24px;
      }
      .empty .ico {
        font-size: 44px;
        opacity: 0.6;
      }
      .empty p {
        margin: 14px 0 0;
      }
      .link-btn {
        color: var(--accent);
        background: none;
        border: none;
        font: inherit;
        cursor: pointer;
        text-decoration: underline;
      }
      /* ── Lists ───────────────────────────────────────────── */
      .list {
        list-style: none;
        margin: 0;
        padding: 6px 0;
      }
      .item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 11px 16px;
        cursor: pointer;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        color: var(--text);
      }
      .item:active {
        background: var(--surface-2);
      }
      .item.playing {
        background: var(--surface-2);
      }
      .item.playing .item__name {
        color: var(--accent);
      }
      .item__icon {
        width: 44px;
        height: 44px;
        border-radius: 9px;
        flex: none;
        background: var(--surface-2);
        display: grid;
        place-items: center;
        font-size: 20px;
        overflow: hidden;
      }
      .item__icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .item__meta {
        min-width: 0;
        flex: 1;
      }
      .item__name {
        font-weight: 600;
        font-size: 15px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .item__sub {
        color: var(--muted);
        font-size: 12.5px;
        margin-top: 2px;
      }
      /* ── Video stage ─────────────────────────────────────── */
      .stage {
        background: #000;
        width: 100%;
        aspect-ratio: 16/9;
        display: block;
      }
      .stage[hidden] {
        display: none;
      }
      #media {
        width: 100%;
        height: 100%;
        background: #000;
        display: block;
      }
      .stage-title {
        padding: 12px 16px 4px;
        font-weight: 700;
      }
      /* ── Now Playing (music) ─────────────────────────────── */
      .np {
        padding: 22px 22px 6px;
        text-align: center;
      }
      .np__art {
        width: min(70vw, 300px);
        aspect-ratio: 1;
        margin: 0 auto;
        border-radius: 18px;
        overflow: hidden;
        background: var(--surface-2);
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5);
      }
      .np__art img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .np__title {
        font-weight: 800;
        font-size: 18px;
        margin: 18px 0 2px;
      }
      .np__sub {
        color: var(--muted);
        font-size: 13px;
      }
      .seek {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 22px 2px;
      }
      .seek input {
        flex: 1;
      }
      .seek .t {
        font-size: 12px;
        color: var(--muted);
        width: 42px;
      }
      .seek .t.r {
        text-align: right;
      }
      input[type='range'] {
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 3px;
        background: var(--line);
        outline: none;
      }
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
      }
      input[type='range']::-moz-range-thumb {
        width: 15px;
        height: 15px;
        border: none;
        border-radius: 50%;
        background: var(--accent);
      }
      .transport {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px 0 8px;
      }
      .tbtn {
        background: none;
        border: none;
        color: var(--text);
        cursor: pointer;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        font-size: 22px;
        display: grid;
        place-items: center;
      }
      .tbtn:active {
        background: var(--surface-2);
      }
      .tbtn.toggle.on {
        color: var(--accent);
      }
      .tbtn--play {
        background: var(--accent);
        color: #fff;
        width: 68px;
        height: 68px;
        font-size: 28px;
        box-shadow: 0 8px 22px rgba(47, 123, 246, 0.45);
      }
      /* ── Mini player ─────────────────────────────────────── */
      .mini {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        display: none;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: var(--surface-2);
        border-top: 1px solid var(--line);
      }
      .mini.show {
        display: flex;
      }
      .mini__art {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        overflow: hidden;
        flex: none;
        background: var(--surface);
      }
      .mini__art img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .mini__meta {
        flex: 1;
        min-width: 0;
      }
      .mini__title {
        font-weight: 700;
        font-size: 13.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .mini__sub {
        color: var(--muted);
        font-size: 11.5px;
      }
      .mini button {
        background: none;
        border: none;
        color: var(--text);
        font-size: 22px;
        cursor: pointer;
        padding: 6px;
      }
      .sr {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
      }
    </style>
  </head>
  <body>
    <header class="appbar">
      <div class="brand">
        <div class="brand__mark">▶</div>
        <div class="app-title">JS Player</div>
      </div>
      <div class="spacer"></div>
      <button class="add-btn" id="addBtn" aria-label="Add songs or videos">
        ＋ Add
      </button>
      <input
        id="fileInput"
        class="sr"
        type="file"
        accept="audio/*,video/*,.mp3,.m4a,.aac,.wav,.ogg,.mp4,.m4v,.webm,.mkv,.mov"
        multiple
      />
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab active" id="tab-music" role="tab" aria-selected="true">
        MUSIC
      </button>
      <button class="tab" id="tab-video" role="tab" aria-selected="false">
        VIDEO
      </button>
    </nav>

    <main>
      <!-- ── Music ─────────────────────────────────────────── -->
      <section
        class="view active"
        id="view-music"
        role="tabpanel"
        aria-label="Music"
      >
        <div class="np" id="nowPlaying">
          <div class="np__art"><img id="npArt" alt="Album art" /></div>
          <div class="np__title" id="npTitle">Nothing playing</div>
          <div class="np__sub" id="npSub">—</div>
          <div class="seek">
            <span class="t" id="curTime">0:00</span>
            <input
              id="seek"
              type="range"
              min="0"
              max="100"
              value="0"
              step="0.1"
              aria-label="Seek"
            />
            <span class="t r" id="durTime">0:00</span>
          </div>
          <div class="transport">
            <button class="tbtn toggle" id="shuffle" aria-label="Shuffle">
              🔀
            </button>
            <button class="tbtn" id="prev" aria-label="Previous">⏮</button>
            <button class="tbtn tbtn--play" id="playPause" aria-label="Play">
              ▶
            </button>
            <button class="tbtn" id="next" aria-label="Next">⏭</button>
            <button class="tbtn toggle" id="repeat" aria-label="Repeat">
              🔁
            </button>
          </div>
        </div>
        <ul class="list" id="musicList"></ul>
        <div class="empty" id="musicEmpty">
          <div class="ico">🎵</div>
          <p>
            No songs yet.<br /><button class="link-btn" data-add>
              Add .mp3 files
            </button>
            to start listening.
          </p>
        </div>
      </section>

      <!-- ── Video ─────────────────────────────────────────── -->
      <section class="view" id="view-video" role="tabpanel" aria-label="Video">
        <div class="stage" id="videoStage" hidden>
          <video id="media" playsinline preload="metadata" controls></video>
        </div>
        <div class="stage-title" id="videoTitle" hidden></div>
        <ul class="list" id="videoList"></ul>
        <div class="empty" id="videoEmpty">
          <div class="ico">🎬</div>
          <p>
            No videos yet.<br /><button class="link-btn" data-add>
              Add .mp4 files
            </button>
            to start watching.
          </p>
        </div>
      </section>
    </main>

    <!-- ── Mini player ─────────────────────────────────────── -->
    <div class="mini" id="miniBar">
      <div class="mini__art"><img id="miniArt" alt="" /></div>
      <div class="mini__meta">
        <div class="mini__title" id="miniTitle">—</div>
        <div class="mini__sub" id="miniSub"></div>
      </div>
      <button id="miniPrev" aria-label="Previous">⏮</button>
      <button id="miniPlay" aria-label="Play">▶</button>
      <button id="miniNext" aria-label="Next">⏭</button>
    </div>

    <script type="module">
      import { LocalPlayer, formatTime } from '../src/index.js';
      import coverUrl from './cover.jpg';

      const $ = (id) => document.getElementById(id);
      const COVER = coverUrl;
      $('npArt').src = COVER;
      $('miniArt').src = COVER;

      // ── Playback engine (library) ──────────────────────────
      const media = $('media');
      const player = new LocalPlayer(media);

      // ── State ──────────────────────────────────────────────
      let lib = []; // {id,name,url,type:'audio'|'video',duration}
      let order = []; // ids in play order
      let currentId = null;
      let shuffle = false;
      let repeat = 'none'; // none | all | one
      let uid = 0;

      const byId = (id) => lib.find((x) => x.id === id);
      const listOf = (type) => lib.filter((x) => x.type === type);

      // ── Add files ──────────────────────────────────────────
      $('addBtn').onclick = () => $('fileInput').click();
      document
        .querySelectorAll('[data-add]')
        .forEach((b) => (b.onclick = () => $('fileInput').click()));

      $('fileInput').onchange = (e) => {
        const files = [...e.target.files];
        let firstAudio = null,
          firstVideo = null;
        for (const f of files) {
          const isAudio =
            f.type.startsWith('audio') ||
            /\.(mp3|m4a|aac|wav|ogg|flac)$/i.test(f.name);
          const item = {
            id: ++uid,
            name: f.name.replace(/\.[^.]+$/, ''),
            url: URL.createObjectURL(f),
            type: isAudio ? 'audio' : 'video',
            duration: 0,
          };
          lib.push(item);
          probeDuration(item);
          if (isAudio && firstAudio === null) firstAudio = item.id;
          if (!isAudio && firstVideo === null) firstVideo = item.id;
        }
        e.target.value = '';
        render();
        // Jump to the tab matching what was added
        if (firstAudio !== null) switchTab('music');
        else if (firstVideo !== null) switchTab('video');
      };

      function probeDuration(item) {
        const el = document.createElement(
          item.type === 'audio' ? 'audio' : 'video',
        );
        el.preload = 'metadata';
        el.src = item.url;
        el.onloadedmetadata = () => {
          item.duration = el.duration || 0;
          render();
        };
      }

      // ── Rendering ──────────────────────────────────────────
      function render() {
        renderList('audio', $('musicList'), $('musicEmpty'));
        renderList('video', $('videoList'), $('videoEmpty'));
      }

      function renderList(type, ul, empty) {
        const items = listOf(type);
        empty.style.display = items.length ? 'none' : '';
        ul.innerHTML = '';
        for (const it of items) {
          const li = document.createElement('button');
          li.className = 'item' + (it.id === currentId ? ' playing' : '');
          li.dataset.id = it.id;
          const icon =
            type === 'audio' ? `<img src="${COVER}" alt="" />` : '🎬';
          li.innerHTML =
            `<div class="item__icon">${icon}</div>` +
            `<div class="item__meta">` +
            `<div class="item__name">${escapeHtml(it.name)}</div>` +
            `<div class="item__sub">${type === 'audio' ? 'Audio' : 'Video'} · ${it.duration ? formatTime(it.duration) : '--:--'}</div>` +
            `</div>`;
          li.onclick = () => playItem(it.id);
          ul.appendChild(li);
        }
      }

      function escapeHtml(s) {
        return s.replace(
          /[&<>"]/g,
          (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c],
        );
      }

      // ── Playback ───────────────────────────────────────────
      function buildOrder(type) {
        const ids = listOf(type).map((x) => x.id);
        if (shuffle) {
          for (let i = ids.length - 1; i > 0; i--) {
            const j = Math.floor((i + 1) * pseudoRandom(i));
            [ids[i], ids[j]] = [ids[j], ids[i]];
          }
        }
        order = ids;
      }
      // deterministic-ish shuffle helper (no Math.random dependency issues)
      function pseudoRandom(seed) {
        const x = Math.sin((seed + 1) * 99991) * 10000;
        return x - Math.floor(x);
      }

      function playItem(id) {
        const it = byId(id);
        if (!it) return;
        currentId = id;
        buildOrder(it.type);
        player.load(it.url);
        player.play();

        const isAudio = it.type === 'audio';
        $('videoStage').hidden = !!isAudio;
        $('videoTitle').hidden = isAudio;
        $('videoTitle').textContent = it.name;
        switchTab(isAudio ? 'music' : 'video');

        $('npTitle').textContent = it.name;
        $('npSub').textContent = isAudio ? 'Audio' : 'Video';
        updateMini();
        render();
      }

      function neighbour(dir) {
        const idx = order.indexOf(currentId);
        if (idx === -1) return null;
        let n = idx + dir;
        if (n < 0) n = repeat === 'all' ? order.length - 1 : 0;
        if (n >= order.length) n = repeat === 'all' ? 0 : order.length - 1;
        return order[n];
      }

      $('playPause').onclick = $('miniPlay').onclick = () => {
        if (currentId === null) {
          const first = listOf('audio')[0] || listOf('video')[0];
          if (first) playItem(first.id);
          return;
        }
        player.paused ? player.play() : player.pause();
      };
      $('prev').onclick = $('miniPrev').onclick = () => {
        if (player.currentTime > 3) return player.seek(0);
        const id = neighbour(-1);
        if (id != null) playItem(id);
      };
      $('next').onclick = $('miniNext').onclick = () => {
        const id = neighbour(1);
        if (id != null && id !== currentId) playItem(id);
      };
      $('shuffle').onclick = () => {
        shuffle = !shuffle;
        $('shuffle').classList.toggle('on', shuffle);
        const cur = byId(currentId);
        if (cur) buildOrder(cur.type);
      };
      $('repeat').onclick = () => {
        repeat = repeat === 'none' ? 'all' : repeat === 'all' ? 'one' : 'none';
        const r = $('repeat');
        r.classList.toggle('on', repeat !== 'none');
        r.textContent = repeat === 'one' ? '🔂' : '🔁';
        r.setAttribute('aria-label', 'Repeat: ' + repeat);
      };

      // ── Seek ───────────────────────────────────────────────
      const seek = $('seek');
      let seeking = false;
      seek.addEventListener('input', () => {
        seeking = true;
        $('curTime').textContent = formatTime(seek.value);
      });
      seek.addEventListener('change', () => {
        player.seek(parseFloat(seek.value));
        seeking = false;
      });

      // ── Player events → UI ─────────────────────────────────
      player.on('timeupdate', (cur, dur) => {
        if (!seeking) {
          seek.value = cur;
        }
        seek.max = dur || 0;
        $('curTime').textContent = formatTime(cur);
        $('durTime').textContent = formatTime(dur);
      });
      player.on('durationchange', (dur) => {
        seek.max = dur || 0;
        $('durTime').textContent = formatTime(dur);
      });
      const reflectPlaying = (playing) => {
        const sym = playing ? '⏸' : '▶';
        $('playPause').textContent = sym;
        $('miniPlay').textContent = sym;
        $('playPause').setAttribute('aria-label', playing ? 'Pause' : 'Play');
      };
      player.on('play', () => reflectPlaying(true));
      player.on('pause', () => reflectPlaying(false));
      player.on('ended', () => {
        if (repeat === 'one') {
          player.seek(0);
          player.play();
          return;
        }
        const id = neighbour(1);
        const idx = order.indexOf(currentId);
        const atEnd = idx === order.length - 1;
        if (id != null && (!atEnd || repeat === 'all') && id !== currentId)
          playItem(id);
        else reflectPlaying(false);
      });

      function updateMini() {
        const it = byId(currentId);
        const bar = $('miniBar');
        if (!it) {
          bar.classList.remove('show');
          return;
        }
        bar.classList.add('show');
        $('miniTitle').textContent = it.name;
        $('miniSub').textContent = it.type === 'audio' ? 'Audio' : 'Video';
      }

      // ── Tabs ───────────────────────────────────────────────
      function switchTab(name) {
        for (const t of ['music', 'video']) {
          const on = t === name;
          $('tab-' + t).classList.toggle('active', on);
          $('tab-' + t).setAttribute('aria-selected', String(on));
          $('view-' + t).classList.toggle('active', on);
        }
      }
      $('tab-music').onclick = () => switchTab('music');
      $('tab-video').onclick = () => switchTab('video');

      // initial paint
      render();

      // PWA (best-effort, non-fatal)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
    </script>
  </body>
</html>
